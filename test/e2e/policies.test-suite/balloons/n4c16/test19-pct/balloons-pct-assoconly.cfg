config:
  agent:
    nodeResourceTopology: true
  allocatorTopologyBalancing: false
  availableResources:
    cpu: cpuset:2-7,10-13
  reservedResources:
    cpu: 750m

  pinCPU: true

  idleCPUClass: default-class

  balloonTypes:
  - name: reserved
    cpuClass: default-class
  - name: assoc-clos1-bln
    cpuClass: assoc-clos1
    minCPUs: 1
    maxCPUs: 2

  cpuClasses:
  - name: default-class
    minFreq: "base"
    maxFreq: "base"
  - name: assoc-clos1
    minFreq: "base"
    maxFreq: "turbo"
    sstClosID: 1

  log:
    debug:
      - policy
      - nri-plugin
      - cpu
      - cpuclass
extraEnv:
  OVERRIDE_SYS_CPUFREQ: '''[{"cpus": "0-15", "base": 2900000, "min": 800000, "max": 3800000}]'''
  OVERRIDE_SST: '''{"supported": true, "clos_count": 4, "packages": [{"id": 0, "cpus": "0-15", "tf_supported": true, "cp_supported": true, "tf_enabled": true, "cp_enabled": true, "clos": [{"id": 0, "min_freq": 0, "max_freq": 0}, {"id": 1, "min_freq": 2900000, "max_freq": 3800000}]}]}'''
  OVERRIDE_SST_STATE_DIR: "/tmp/nri-pct-mock"
