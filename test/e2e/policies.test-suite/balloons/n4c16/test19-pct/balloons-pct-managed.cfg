config:
  agent:
    nodeResourceTopology: true
  allocatorTopologyBalancing: false
  availableResources:
    cpu: cpuset:2-7,10-13
  reservedResources:
    cpu: 750m

  pinCPU: true

  idleCPUClass: default-class

  balloonTypes:
  - name: reserved
    cpuClass: default-class
  - name: pct-hp-bln
    cpuClass: pct-hp
    minCPUs: 1
    maxCPUs: 1
  - name: pct-hp2-bln
    cpuClass: pct-hp
    minCPUs: 1
    maxCPUs: 2
  - name: pct-lp-bln
    cpuClass: pct-lp
    minCPUs: 1
    maxCPUs: 2
  - name: pct-lp2-bln
    cpuClass: pct-lp
    minCPUs: 1
    maxCPUs: 1

  cpuClasses:
  - name: default-class
    minFreq: "base"
    maxFreq: "base"
  - name: pct-hp
    minFreq: "turbo"
    maxFreq: "turbo"
    pctPriority: high
  - name: pct-lp
    minFreq: "min"
    maxFreq: "base"
    pctPriority: low

  log:
    debug:
      - policy
      - nri-plugin
      - cpu
      - cpuclass
extraEnv:
  OVERRIDE_SYS_CPUFREQ: '''[{"cpus": "0-15", "base": 2900000, "min": 800000, "max": 3800000}]'''
  OVERRIDE_SST: '''{"supported": true, "clos_count": 4, "packages": [{"id": 0, "cpus": "0-7", "tf_supported": true, "cp_supported": true, "max_hp_cpus": 2}, {"id": 1, "cpus": "8-15", "tf_supported": true, "cp_supported": true, "max_hp_cpus": 2}]}'''
  OVERRIDE_SST_STATE_DIR: "/tmp/nri-pct-mock"
