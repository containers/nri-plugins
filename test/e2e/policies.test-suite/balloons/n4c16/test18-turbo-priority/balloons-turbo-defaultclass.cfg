config:
  agent:
    nodeResourceTopology: true
  allocatorTopologyBalancing: false
  availableResources:
    cpu: cpuset:2-7,10-13
  reservedResources:
    cpu: 750m

  pinCPU: true

  # Intentionally no idleCPUClass and no cpuClass on the reserved
  # balloon type: both must fall back to the cpuClass named "default".
  balloonTypes:
  - name: reserved
  - name: fast-bln
    cpuClass: fast
    minCPUs: 1
    maxCPUs: 1

  cpuClasses:
  - name: default
    minFreq: "min"
    maxFreq: "base"
  - name: fast
    minFreq: "turbo"
    maxFreq: "turbo"

  log:
    debug:
      - policy
      - nri-plugin
      - cpu
      - cpuclass
extraEnv:
  OVERRIDE_SYS_CPUFREQ: '''[{"cpus": "0-15", "base": 2900000, "min": 800000, "max": 3800000}]'''
