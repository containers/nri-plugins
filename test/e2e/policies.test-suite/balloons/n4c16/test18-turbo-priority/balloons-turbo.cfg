config:
  agent:
    nodeResourceTopology: true
  allocatorTopologyBalancing: false
  availableResources:
    cpu: cpuset:2-7,10-13
  reservedResources:
    cpu: 750m

  pinCPU: true

  idleCPUClass: default-noturbo

  balloonTypes:
  - name: reserved
    cpuClass: default-turbo
  - name: turbo-high-bln
    cpuClass: turbo-high
    minCPUs: 1
    maxCPUs: 2
  - name: turbo-low-bln
    cpuClass: turbo-low
    minCPUs: 1
    maxCPUs: 2

  cpuClasses:
  - name: turbo-high
    minFreq: "turbo"
    maxFreq: "turbo"
    turboPriority: 10
  - name: turbo-low
    minFreq: "turbo"
    maxFreq: "turbo"
    turboPriority: 1
  - name: default-turbo
    minFreq: "min"
    maxFreq: "turbo"
  - name: default-noturbo
    minFreq: "min"
    maxFreq: "base"

  log:
    debug:
      - policy
      - nri-plugin
      - cpu
      - cpuclass
extraEnv:
  OVERRIDE_SYS_CPUFREQ: '''[{"cpus": "0-15", "base": 2900000, "min": 800000, "max": 3800000}]'''
