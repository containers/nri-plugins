config:
  agent:
    nodeResourceTopology: true
  allocatorTopologyBalancing: false
  availableResources:
    cpu: cpuset:2-7,10-13
  reservedResources:
    cpu: 750m

  pinCPU: true

  idleCPUClass: legacy-idle

  balloonTypes:
  - name: legacy-bln
    cpuClass: legacy-fast
    minCPUs: 1
    maxCPUs: 1

  control:
    cpu:
      classes:
        legacy-idle:
          minFreq: 800000
          maxFreq: 2900000
        legacy-fast:
          minFreq: 3800000
          maxFreq: 3800000

  log:
    debug:
      - policy
      - nri-plugin
      - cpu
      - cpuclass
extraEnv:
  OVERRIDE_SYS_CPUFREQ: '''[{"cpus": "0-15", "base": 2900000, "min": 800000, "max": 3800000}]'''
