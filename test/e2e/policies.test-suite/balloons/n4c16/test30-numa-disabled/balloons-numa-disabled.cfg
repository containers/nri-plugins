config:
  agent:
    nodeResourceTopology: true
  balloonTypes:
    - name: single-thread-own-core
      minCPUs: 2
      maxCPUs: 2
      minBalloons: 1
      preferCloseToDevices:
      - /sys/devices/system/cpu/cpu7/cache/index2
    - name: default
      allocatorTopologyBalancing: true
      preferSpreadingPods: true # spread containers in the same pod to balance default balloons
      minCPUs: 5
      minBalloons: 2 # create 1 default balloon per package
      showContainersInNrt: true
  log:
    debug:
      - policy
    klog:
      skip_headers: true
